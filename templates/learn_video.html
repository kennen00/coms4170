{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-12">
            <h1>{{ rudiment.title }}</h1>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <h3>Demo Video</h3>
            <div class="ratio ratio-16x9">
                <iframe src="https://www.youtube.com/embed/{{ rudiment.video.split('v=')[1] }}"
                    title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}
</div>
{% endblock %}
