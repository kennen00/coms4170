<div class="mt-3">
    <div class="d-flex justify-content-between align-items-center">
        {% if nav.prev_url %}
        <a href="{{ nav.prev_url }}" class="btn btn-main btn-lg">
            {{ nav.prev_label }}
        </a>
        {% else %}
        <span></span>
        {% endif %}

        {% if nav.next_url %}
        <a href="{{ nav.next_url }}" class="btn btn-main btn-lg">
            {{ nav.next_label }}
        </a>
        {% else %}
        <span></span>
        {% endif %}
    </div>
</div>
