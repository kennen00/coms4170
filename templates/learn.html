{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row">
    <div class="col-12">
      <h1>{{ rudiment.title }}</h1>
      <p class="lead">{{ rudiment.description }}</p>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-md-6">
      <h3>Video</h3>
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/{{ rudiment.video.split('v=')[1] }}"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="col-md-6">
      <h3>Notation</h3>
      <div id="vexflow-container" data-sequence='{{ rudiment.sequence | tojson }}'></div>
    </div>
  </div>
</div>

<!-- VexFlow CDN -->
<script src="https://cdn.jsdelivr.net/npm/vexflow/build/vexflow.js"></script>
<script src="{{ url_for('static', filename='learn.js') }}"></script>
{% endblock %}
