{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-12 text-center">
            <h1>Quiz Complete!</h1>
            <p class="lead mt-4">You scored <strong>{{ score }}</strong> out of <strong>{{ total }}</strong>.</p>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 text-center">
            <div class="btn-group" role="group">
                <a href="{{ url_for('quiz_new') }}" class="btn btn-outline-primary">Try Again</a>
                <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
