{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5 page-fill">
    <div class="row">
        <div class="col-12 text-center">
            <h1>Record Your Own Rudiment</h1>
            <p class="text-muted small">Name your rudiment, then play the sticks. The notation will build as you play.
            </p>
            <p class="text-muted small">Keyboard: press <strong>F</strong> or <strong>←</strong> for left stick, and
                <strong>J</strong> or <strong>→</strong> for right stick.</p>
        </div>
    </div>

    <div class="row mt-3 justify-content-center">
        <div class="col-md-6">
            <input type="text" id="rudiment-name" class="form-control form-control-lg text-center"
                placeholder="Rudiment name" maxlength="80">
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 text-center">
            <h2 id="rudiment-name-display" class="mb-3"></h2>
            <div id="vexflow-scroll" class="vexflow-scroll">
                <div id="vexflow-container"></div>
            </div>
        </div>
    </div>

    <div class="row mt-auto pb-3">
        <div class="col-12">
            {% include 'drum.html' %}
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 text-center">
            <button id="record-reset" class="btn btn-outline-secondary d-none">Reset</button>
            <button id="record-export" class="btn btn-main" disabled>Export SVG</button>
        </div>
    </div>
</div>

<!-- VexFlow CDN -->
<script src="https://cdn.jsdelivr.net/npm/vexflow/build/vexflow.js"></script>
<script src="{{ url_for('static', filename='record.js') }}"></script>
{% endblock %}
